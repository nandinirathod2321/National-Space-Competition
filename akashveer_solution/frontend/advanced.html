<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akashveer — Advanced Mission Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Spectral:wght@200;400&family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');
        * { scroll-behavior: smooth; }

        /* ═══════════════════════════════════════
           CELESTIAL DIAGRAM THEME (Star Chart)
           REPLACING PURPLE WITH BLUE/SILVER
        ═══════════════════════════════════════ */
        :root {
            --bg-void:    #000103;
            --bg-panel:   rgba(0, 1, 3, 0.95);
            --bg-card:    rgba(30, 144, 255, 0.05);
            --border-dim: rgba(192, 192, 204, 0.18);
            --border-glow:rgba(30, 144, 255, 0.45);
            --purple-bright: #1e90ff; /* celestial blue */
            --purple-mid:    #63b3ed;
            --purple-dim:    rgba(30, 144, 255, 0.2);
            --purple-glow:   rgba(30, 144, 255, 0.1);
            --text-hi:  #f8fafc;
            --text-mid: #94a3b8;
            --text-lo:  #475569;
            --font-serif: 'Cormorant Garamond', serif;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 50% 10%, #050a14 0%, var(--bg-void) 80%);
            color: var(--text-hi);
            font-family: 'Spectral', serif;
            overflow: hidden;
            font-weight: 200;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(30, 144, 255, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #1e90ff; }

        /* ── Header ── */
        .module-header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 25px;
            background: rgba(0,1,3,0.9);
            border-bottom: 0.5px dashed var(--border-dim);
            font-family: var(--font-serif);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .module-header h1 {
            margin: 0;
            font-size: 2.1em;
            font-style: italic;
            font-weight: 400;
            background: linear-gradient(135deg, #fff, #1e90ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(30, 144, 255, 0.3);
            letter-spacing: 2px;
        }
        .module-header .status {
            font-family: 'Spectral', serif;
            font-style: italic;
            font-size: 0.85em;
            color: var(--text-mid);
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* ── Grid ── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr 1fr;
            gap: 12px;
            height: 100vh;
            padding: 15px;
            background: var(--bg-void);
        }

        /* ── Module Cards ── */
        .module {
            background: var(--bg-panel);
            border: 0.5px solid var(--border-dim);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
        }
        .module:hover {
            border-color: var(--border-glow);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(30,144,255,0.02);
        }
        .module h2 {
            margin: 0;
            padding: 12px 18px;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1em;
            letter-spacing: 1.5px;
            background: rgba(30,144,255,0.03);
            border-bottom: 0.5px dashed var(--border-dim);
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .module-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ── Map ── */
        #map { height: 100%; width: 100%; filter: invert(0.9) hue-rotate(180deg) brightness(0.8) contrast(1.2); }

        /* ── Bullseye ── */
        #bullseye-canvas { width: 100%; height: 100%; display: block; opacity: 0.9; }

        /* ── Heatmap ── */
        .heatmap-container { padding: 15px; overflow-y: auto; height: 100%; }
        .fuel-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px 15px;
            background: rgba(255,255,255,0.02);
            border: 0.5px dashed var(--border-dim);
            font-size: 0.8em;
            transition: all 0.3s ease;
        }
        .fuel-bar:hover {
            border-color: var(--purple-mid);
            background: rgba(30,144,255,0.05);
            transform: scale(1.01);
        }
        .fuel-bar-label { min-width: 80px; color: var(--text-mid); font-family: var(--font-serif); font-style: italic; }
        .fuel-bar-fill {
            flex: 1;
            height: 2px;
            background: #1e90ff;
            box-shadow: 0 0 10px #1e90ff;
            position: relative;
        }
        .fuel-bar-value { min-width: 60px; text-align: right; color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 0.9em; }

        /* ── Gantt ── */
        .gantt-container { padding: 15px; overflow-x: auto; height: 100%; }
        .gantt-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            background: transparent;
            border-bottom: 0.5px solid var(--border-dim);
            padding-bottom: 8px;
        }
        .gantt-label { min-width: 90px; font-size: 0.8em; color: var(--text-mid); font-family: var(--font-serif); font-style: italic; }
        .gantt-timeline { flex: 1; height: 18px; background: rgba(255,255,255,0.02); border-left: 0.5px solid var(--border-dim); border-right: 0.5px solid var(--border-dim); position: relative; }
        .gantt-block {
            position: absolute;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6em;
            color: white;
            font-weight: bold;
            letter-spacing: 0.5px;
            background: #1e90ff;
            box-shadow: 0 0 10px rgba(30,144,255,0.4);
        }

        #btn-back-globe {
            background: transparent;
            border: 0.5px solid var(--border-dim);
            border-radius: 2px;
            padding: 8px 18px;
            color: #fff;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 0.85em;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 25px;
        }
        #btn-back-globe:hover {
            border-color: #1e90ff;
            background: rgba(30,144,255,0.05);
            box-shadow: 0 0 15px rgba(30,144,255,0.15);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="module-header">
        <button id="btn-back-globe" onclick="window.location.href='/dashboard'" title="Back to 3D Globe">
            &#x2190; GLOBE VIEW
        </button>
        <button id="btn-to-maneuver" onclick="window.location.href='/maneuver'" title="Go to Maneuver Control" 
                style="background: linear-gradient(90deg, rgba(239, 68, 68, 0.2), transparent); border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 5px; padding: 8px 15px; color: #fca5a5; font-family: 'Orbitron', sans-serif; font-size: 0.75em; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s ease; margin-left: 20px;">
            MANEUVER
        </button>
        <h1>AKASHVEER ADVANCED MISSION CONTROL</h1>
        <div class="status">
            <span id="status-sats">0 Satellites</span> | 
            <span id="status-debris">0 Objects</span> | 
            <span id="status-time">T+00:00:00</span>
        </div>
    </div>

    <!-- Dashboard Grid -->
    <div class="dashboard-grid">
        <!-- 1. GROUND TRACK MAP (Mercator Projection) -->
        <div class="module" style="grid-column: 1; grid-row: 2 / 4;">
            <h2>GROUND TRACK MAP (Mercator)</h2>
            <div class="module-content">
                <div id="map"></div>
            </div>
        </div>

        <!-- 2. BULLSEYE CONJUNCTION CHART (Polar) -->
        <div class="module" style="grid-column: 2; grid-row: 2;">
            <h2>CONJUNCTION BULLSEYE CHART</h2>
            <div class="module-content">
                <canvas id="bullseye-canvas"></canvas>
            </div>
        </div>

        <!-- 3. TELEMETRY HEATMAP -->
        <div class="module" style="grid-column: 2; grid-row: 3;">
            <h2>TELEMETRY & RESOURCE HEATMAP</h2>
            <div class="module-content">
                <div class="heatmap-container" id="heatmap-container"></div>
            </div>
        </div>

        <!-- 4. MANEUVER TIMELINE (Gantt) -->
        <div class="module" style="grid-column: 1 / -1; grid-row: 4;">
            <h2>MANEUVER TIMELINE (Gantt Scheduler)</h2>
            <div class="module-content">
                <div class="gantt-container" id="gantt-container"></div>
            </div>
        </div>
    </div>

    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="/static/advanced-dashboard.js"></script>
</body>
</html>
